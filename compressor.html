<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width">
    <title>Compressor</title>
    <link href="style.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <svg style="display: none;">
        <symbol id="icon-dropdown" viewBox="5.9 7.9 11.8 7.2">
            <path class="st0" d="M12.7071 14.7071C12.3166 15.0976 11.6834 15.0976 11.2929 14.7071L6.29289 9.70711C5.90237 9.31658 5.90237 8.68342 6.29289 8.29289C6.68342 7.90237 7.31658 7.90237 7.70711 8.29289L12 12.5858L16.2929 8.29289C16.6834 7.90237 17.3166 7.90237 17.7071 8.29289C18.0976 8.68342 18.0976 9.31658 17.7071 9.70711L12.7071 14.7071Z"/>
        </symbol>
    </svg>

    <h1>Local Video Compressor</h1>
    <input type="file" id="fileInput" />
    <button id="compressButton">Compress</button>
    <br><br>
    <video id="outputVideo" controls></video>

    <div style="display: flex; width: 30%; margin: 0 auto; justify-content: center;">
        <div>
            <div id="set-preset" class="dropdown-container disable-select" style="margin: 10px;">
                <div class="dropdown-button" onclick="toggleDropdown(this)" style="padding: 10px 15px;">
                    <div style="display: flex; align-items: center;">
                        <div class="dropdown-text" style="font-size: 20px; padding: 0 15px;">Preset: Ultra Fast</div>
                        <svg class="flip" fill="currentColor" width="20px" height="20px">
                            <use href="#icon-dropdown"></use>
                        </svg>
                    </div>
                </div>
                <div class="dropdown-content fade-bottom">
                    <a onclick="setPreset('ultrafast', 'Ultra Fast')">Ultra Fast</a>
                    <a onclick="setPreset('superfast', 'Super Fast')">Super Fast</a>
                    <a onclick="setPreset('veryfast', 'Very Fast')">Very Fast</a>
                    <a onclick="setPreset('faster', 'Faster')">Faster</a>
                    <a onclick="setPreset('fast', 'Fast')">Fast</a>
                    <a onclick="setPreset('medium', 'Medium')">Medium</a>
                    <a onclick="setPreset('slow', 'Slow')">Slow</a>
                    <a onclick="setPreset('slower', 'Slower')">Slower</a>
                    <a onclick="setPreset('veryslow', 'Very Slow')">Very Slow</a>
                    <a onclick="setPreset('placebo', 'Placebo')">Placebo</a>
                </div>
            </div>
        </div>
    
        <div>
            <div id="set-resolution" class="dropdown-container disable-select" style="margin: 10px">
                <div class="dropdown-button" onclick="toggleDropdown(this)" style="padding: 10px 15px;">
                    <div style="display: flex; align-items: center;">   
                        <div class="dropdown-text" style="font-size: 20px; padding: 0 15px;">Resolution: 1080x1920</div>
                        <svg class="flip" fill="currentColor" width="20px" height="20px">
                            <use href="#icon-dropdown"></use>
                        </svg>
                    </div>
                </div>
                <div class="dropdown-content fade-bottom">
                    <a onclick="setPreset('ultrafast', 'Ultra Fast')">Ultra Fast</a>
                    <a onclick="setPreset('superfast', 'Super Fast')">Super Fast</a>
                    <a onclick="setPreset('veryfast', 'Very Fast')">Very Fast</a>
                    <a onclick="setPreset('faster', 'Faster')">Faster</a>
                    <a onclick="setPreset('fast', 'Fast')">Fast</a>
                    <a onclick="setPreset('medium', 'Medium')">Medium</a>
                    <a onclick="setPreset('slow', 'Slow')">Slow</a>
                    <a onclick="setPreset('slower', 'Slower')">Slower</a>
                    <a onclick="setPreset('veryslow', 'Very Slow')">Very Slow</a>
                    <a onclick="setPreset('placebo', 'Placebo')">Placebo</a>
                </div>
            </div>
        </div>
    </div>

    <div id="sidebar"></div>
    <script src="sidebar.js"></script>

    <script type="module" src="compressor.js"></script>
</body>
</html>
